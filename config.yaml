video:
  resolution_width: 1080
  resolution_height: 1920
  fps: 30
  target_duration_sec: 45
  background_music_volume_db: -20

subtitle:
  font: "Arial"
  font_size: 72
  primary_color: "&H00FFFF00"     # Yellow
  outline_color: "&H00000000"     # Black
  outline_width: 3
  bold: 1
  alignment: 5                    # Middle centre
  margin_v: 0                      # No vertical margin (centred)
  words_per_chunk: 1

paths:
  backgrounds: "assets/backgrounds/"
  music: "assets/music/"
  temp: "assets/temp/"
  output: "output/"
  archive: "archive/"
  logs: "logs/"
  characters: "assets/characters/"
  queue: "queue.json"
  history: "history.json"
  credentials: "credentials/"
  kokoro_model: "models/kokoro/kokoro-v1.0.onnx"
  kokoro_voices: "models/kokoro/voices-v1.0.bin"

ffmpeg:
  libass_check: true             # Hard-fail at startup if missing
  intermediate_codec: "libx264"
  final_codec: "libx264"
  audio_codec: "aac"

health_checks:
  min_free_disk_gb: 2
  oauth_warning_days: 2          # Alert when token expires within 2 days
