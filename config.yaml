# ============================================================
# YT Shorts Agent — Configuration
# ============================================================

pipeline:
  videos_per_day: 3
  generation_time: "01:00"       # When daily generation runs
  upload_slots:
    - "09:00"
    - "15:00"
    - "20:00"
  tts_engine: "kokoro"
  tts_speed: 1.0

characters:
  - name: "Nobita"
    show: "Doraemon"
    role: "confused"
    voice: "am_puck"
    image_folder: "assets/characters/Nobita/"
  - name: "Doraemon"
    show: "Doraemon"
    role: "explainer"
    voice: "bm_george"
    image_folder: "assets/characters/Doraemon/"
  - name: "Light Yagami"
    show: "Death Note"
    role: "explainer"
    voice: "bm_lewis"
    image_folder: "assets/characters/LightYagami/"
  - name: "Gojo"
    show: "Jujutsu Kaisen"
    role: "explainer"
    voice: "am_fenrir"
    image_folder: "assets/characters/Gojo/"
  - name: "Luffy"
    show: "One Piece"
    role: "confused"
    voice: "am_michael"
    image_folder: "assets/characters/Luffy/"

